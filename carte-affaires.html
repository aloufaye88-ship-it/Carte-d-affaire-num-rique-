<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awa Ndiaye — Carte d'affaires numérique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10122A;
    --bg-glow: #1B1E45;
    --surface: #191C3E;
    --surface-2: #21254C;
    --gold: #C9A24B;
    --gold-soft: #E4C97A;
    --text: #F5F3EC;
    --text-dim: #A6A9C8;
    --whatsapp: #3FB37F;
    --radius: 22px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    background:
      radial-gradient(circle at 20% -10%, var(--bg-glow) 0%, transparent 55%),
      radial-gradient(circle at 90% 110%, #241a44 0%, transparent 45%),
      var(--bg);
    font-family: 'Manrope', sans-serif;
    color: var(--text);
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 380px;
    background: linear-gradient(165deg, var(--surface) 0%, #14163A 100%);
    border-radius: var(--radius);
    padding: 2px;
    isolation: isolate;
  }

  /* Signature element: a slow gold sheen tracing the card edge, like a foil-stamped border */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    padding: 1.5px;
    background: conic-gradient(from 0deg, transparent 0deg, var(--gold-soft) 40deg, transparent 90deg, transparent 360deg);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: sweep 6s linear infinite;
    z-index: -1;
  }

  @keyframes sweep {
    to { transform: rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .card::before { animation: none; }
  }

  .card-inner {
    padding: 36px 28px 28px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 26px;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    color: #10122A;
    flex-shrink: 0;
  }

  .identity .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.15;
    margin: 0 0 4px;
    font-optical-sizing: auto;
  }

  .identity .role {
    margin: 0;
    font-size: 13.5px;
    color: var(--gold-soft);
    letter-spacing: 0.02em;
  }

  .identity .company {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--text-dim);
  }

  .actions {
    display: grid;
    gap: 10px;
    margin-bottom: 24px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-radius: 13px;
    text-decoration: none;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .btn:hover { transform: translateY(-1px); background: #262a56; }
  .btn:focus-visible { outline: 2px solid var(--gold-soft); outline-offset: 2px; }

  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn.primary {
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    color: #14163A;
    border: none;
  }

  .btn.whatsapp svg { color: var(--whatsapp); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 22px 0 18px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .qr-block {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface-2);
    border-radius: 16px;
    padding: 14px;
  }

  .qr-block img {
    width: 78px;
    height: 78px;
    border-radius: 8px;
    background: #fff;
    padding: 4px;
    flex-shrink: 0;
  }

  .qr-text p {
    margin: 0;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .qr-text strong {
    color: var(--text);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-inner">

    <div class="header">
      <div class="avatar">AN</div>
      <div class="identity">
        <p class="name">Awa Ndiaye</p>
        <p class="role">Fondatrice</p>
        <p class="company">Ndiaye Textiles</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" onclick="downloadVCard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        Enregistrer le contact
      </button>

      <a class="btn whatsapp" href="https://wa.me/221771234567" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.39 1.26 4.81L2 22l5.41-1.36a9.86 9.86 0 0 0 4.63 1.15h.01c5.46 0 9.9-4.45 9.9-9.9C21.96 6.45 17.5 2 12.04 2zm5.8 14.02c-.24.68-1.4 1.3-1.94 1.36-.5.06-1.12.09-1.8-.11-.42-.13-.95-.3-1.64-.6-2.88-1.25-4.76-4.15-4.9-4.34-.14-.19-1.18-1.57-1.18-3 0-1.43.75-2.13 1.02-2.42.27-.29.58-.36.78-.36.2 0 .39 0 .56.01.18.01.42-.07.65.5.24.58.82 2 .89 2.14.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.17-.29.37-.42.5-.14.14-.28.29-.12.56.16.28.72 1.19 1.55 1.93 1.06.95 1.96 1.24 2.24 1.38.28.14.44.12.6-.07.17-.19.71-.83.9-1.11.19-.28.38-.24.64-.14.26.1 1.66.78 1.94.93.28.14.47.21.54.33.07.12.07.7-.17 1.38z"/></svg>
        WhatsApp
      </a>

      <a class="btn" href="tel:+221771234567">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92z"/></svg>
        +221 77 123 45 67
      </a>

      <a class="btn" href="mailto:awa@ndiayetextiles.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6c0-1.1-.9-2-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6zm-2 0-8 5-8-5"/></svg>
        awa@ndiayetextiles.com
      </a>

      <a class="btn" href="https://ndiayetextiles.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        ndiayetextiles.com
      </a>
    </div>

    <div class="divider">Partager la carte</div>

    <div class="qr-block">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://ndiayetextiles.com/carte/awa-ndiaye" alt="Code QR de la carte">
      <div class="qr-text">
        <p><strong>Scannez pour ouvrir</strong><br>cette carte sur un autre téléphone.</p>
      </div>
    </div>

  </div>
</div>

<script>
function downloadVCard() {
  const vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Ndiaye;Awa;;;",
    "FN:Awa Ndiaye",
    "ORG:Ndiaye Textiles",
    "TITLE:Fondatrice",
    "TEL;TYPE=CELL:+221771234567",
    "EMAIL:awa@ndiayetextiles.com",
    "URL:https://ndiayetextiles.com",
    "END:VCARD"
  ].join("\n");

  const blob = new Blob([vcard], { type: "text/vcard" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "awa-ndiaye.vcf";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
